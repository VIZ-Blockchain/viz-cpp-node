name: Windows Release

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'documentation/**'
      - '**.md'

permissions:
  contents: write  # required for creating GitHub Releases

jobs:
  build-windows:
    name: Build & Release (Windows / MinGW UCRT64)
    runs-on: windows-latest
    timeout-minutes: 240  # 4h circuit breaker; cold build ~60-90 min, cached ~15-30 min

    # Every `run:` step executes inside the MSYS2 UCRT64 login shell so the
    # ucrt64 gcc/g++ toolchain is on PATH and find_package() resolves the
    # MSYS2-provided OpenSSL/zlib without any path juggling.
    defaults:
      run:
        shell: msys2 {0}

    env:
      BOOST_VERSION: "1.84.0"

    steps:
      # ──────────────────────────────────────────────────────────────
      # Checkout (uses: action — not affected by the default msys2 shell)
      # ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ──────────────────────────────────────────────────────────────
      # MSYS2 / UCRT64 toolchain
      #
      # We deliberately build on MinGW (gcc) rather than MSVC: gcc's libgcc
      # unwinder tolerates fc's boost.context fiber stacks, whereas MSVC's
      # /EHa + table-based SEH faults on them. The project's CMake already has
      # a dedicated MINGW branch (flags, -Wa,-mbig-obj, static runtime).
      # ──────────────────────────────────────────────────────────────
      - name: Setup MSYS2 UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel
            git
            zip
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-ccache
            mingw-w64-ucrt-x86_64-openssl
            mingw-w64-ucrt-x86_64-zlib

      # ──────────────────────────────────────────────────────────────
      # Boost 1.84.0 — built from source with the ucrt64 gcc.
      #
      # Pinned to 1.84.0: it still ships Boost.Coroutine v1, whose
      # stack_allocator fc's thread/context layer depends on. Newer Boost
      # may drop it. The install dir is cached across runs.
      # ──────────────────────────────────────────────────────────────
      - name: Cache Boost
        id: cache-boost
        uses: actions/cache@v4
        with:
          path: boost-install
          key: boost-mingw-ucrt64-${{ env.BOOST_VERSION }}-v1

      - name: Build Boost from source
        if: steps.cache-boost.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          ver="${BOOST_VERSION}"
          ver_us="${ver//./_}"        # 1.84.0 -> 1_84_0
          tarball="boost_${ver_us}.tar.gz"
          url="https://archives.boost.io/release/${ver}/source/${tarball}"

          echo "Downloading Boost ${ver} from ${url} ..."
          curl -fL --retry 3 -o "${tarball}" "${url}"
          tar -xzf "${tarball}"
          cd "boost_${ver_us}"

          echo "Bootstrapping b2 (gcc)..."
          ./bootstrap.sh --with-toolset=gcc

          echo "Building Boost (jobs=$(nproc))..."
          ./b2 install \
            --prefix="$(pwd)/../boost-install" \
            --with-thread --with-date_time --with-system --with-filesystem \
            --with-program_options --with-serialization --with-chrono \
            --with-test --with-context --with-locale --with-coroutine \
            --with-iostreams --with-regex \
            toolset=gcc \
            variant=release \
            link=static \
            threading=multi \
            address-model=64 \
            "-j$(nproc)"

      # ──────────────────────────────────────────────────────────────
      # ccache — object cache across runs. CMake auto-detects ccache and
      # routes compiles through it (find_program(CCACHE_FOUND ccache)).
      # ──────────────────────────────────────────────────────────────
      - name: Cache ccache storage
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-mingw-ucrt64-${{ hashFiles('**/CMakeLists.txt', 'libraries/**', 'plugins/**', 'programs/**', 'thirdparty/**') }}
          restore-keys: |
            ccache-mingw-ucrt64-

      # ──────────────────────────────────────────────────────────────
      # Configure
      # ──────────────────────────────────────────────────────────────
      - name: Configure CMake
        run: |
          set -euo pipefail
          export CCACHE_DIR="$(cygpath -m "$(pwd)/.ccache")"
          export BOOST_ROOT="$(pwd)/boost-install"
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DBOOST_ROOT="$(cygpath -m "${BOOST_ROOT}")" \
            -DBoost_NO_SYSTEM_PATHS=ON \
            -DBoost_USE_STATIC_LIBS=ON \
            -DBUILD_SHARED_LIBRARIES=OFF \
            -DBUILD_TESTNET=OFF \
            -DCHAINBASE_CHECK_LOCKING=OFF \
            -DFULL_STATIC_BUILD=ON

      # ──────────────────────────────────────────────────────────────
      # Build — only vizd and cli_wallet
      # ──────────────────────────────────────────────────────────────
      - name: Build vizd and cli_wallet
        run: |
          set -euo pipefail
          export CCACHE_DIR="$(cygpath -m "$(pwd)/.ccache")"
          cmake --build build --target vizd cli_wallet "-j$(nproc)"

      - name: Print ccache stats
        if: always()
        run: ccache --show-stats || true

      # ──────────────────────────────────────────────────────────────
      # Bundle executables with their non-system DLL dependencies.
      # FULL_STATIC_BUILD statically links libstdc++/libgcc; the remaining
      # ucrt64 DLLs (winpthread, OpenSSL, zlib) are copied next to the exe.
      # ──────────────────────────────────────────────────────────────
      - name: Bundle release artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          cp build/programs/vizd/vizd.exe dist/
          cp build/programs/cli_wallet/cli_wallet.exe dist/
          for exe in dist/*.exe; do
            ldd "$exe" | grep -iE '/ucrt64/bin/' | awk '{print $3}' | sort -u | while read -r dll; do
              [ -f "$dll" ] && cp -u "$dll" dist/ || true
            done
          done
          echo "=== dist contents ==="
          ls -la dist/
          zip -j vizd-windows-ucrt64.zip dist/*

      - name: Verify executables exist
        run: |
          set -euo pipefail
          for f in dist/vizd.exe dist/cli_wallet.exe; do
            if [ -f "$f" ]; then
              echo "OK: $f ($(stat -c %s "$f") bytes)"
            else
              echo "MISSING: $f"; exit 1
            fi
          done

      # ──────────────────────────────────────────────────────────────
      # GitHub Release — tag: win-<short-sha>
      # ──────────────────────────────────────────────────────────────
      - name: Derive release metadata
        id: meta
        shell: pwsh
        run: |
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $tag = "win-$shortSha"
          $date = (Get-Date -Format "yyyy-MM-dd")
          $name = "Windows Build $date ($shortSha)"
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "name=$name" >> $env:GITHUB_OUTPUT
          Write-Host "Release tag: $tag"
          Write-Host "Release name: $name"

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          generate_release_notes: true
          files: |
            vizd-windows-ucrt64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
